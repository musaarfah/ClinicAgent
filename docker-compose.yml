services:
  postgres:
    image: postgres:16-alpine
    container_name: clinic-agent-postgres
    environment:
      POSTGRES_DB: clinic_agent
      POSTGRES_USER: clinic_agent
      POSTGRES_PASSWORD: clinic_agent
    ports:
      - "5433:5432"
    volumes:
      - clinic_agent_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clinic_agent -d clinic_agent"]
      interval: 5s
      timeout: 3s
      retries: 10

  mcp:
    image: python:3.12-slim
    container_name: clinic-agent-mcp
    working_dir: /app
    command: sh -c "pip install -e . && python -m clinic_agent_mcp.server"
    environment:
      DATABASE_URL: postgresql+psycopg://clinic_agent:clinic_agent@postgres:5432/clinic_agent
      MCP_HOST: 0.0.0.0
      MCP_PORT: 9100
    ports:
      - "9100:9100"
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  clinic_agent_postgres_data:
